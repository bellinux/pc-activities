<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Extracción de Texto</title>
    <style>
        body { 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #fff; 
            color: #111; padding: 40px; margin: 0; line-height: 1.6; min-height: 100vh;
            position: relative;
        }
        
        /* Typography Hierarchy */
        h1 { text-align: center; font-weight: 300; font-size: 2.2em; margin-bottom: 50px; color: #111; }
        h2.platform-title { font-weight: 400; font-size: 1.8em; margin: 0; text-align: center; color: #333; }
        h3.section-subtitle { font-weight: 600; font-size: 1.1em; color: #777; margin: 20px 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Layout */
        .row { display: flex; width: 100%; max-width: 100%; margin: 0; box-sizing: border-box; }
        .col { flex: 1; min-width: 0; padding-right: 40px; padding-left: 20px; }
        .col-right { flex: 1; min-width: 0; padding-left: 40px; padding-right: 20px; }
        
        .center-line {
            position: absolute;
            top: 130px;
            bottom: 40px;
            left: 50%;
            border-left: 1px dashed #ccc;
            z-index: -1;
        }
        
        /* Imágenes */
        .images-row { margin-bottom: 20px; align-items: flex-start; }
        .source-image { width: 100%; height: auto; display: block; margin: 0 auto; }

        /* Bloques de Texto - VS Code Style Indent Guides */
        .text-container {
            overflow-x: auto;
        }
        .code-line {
            display: flex;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            color: #2c3e50;
            line-height: 1.6;
        }
        .indent-guide {
            width: 16px;
            border-left: 2px solid #bdc3c7;
            flex-shrink: 0;
        }
        .code-text {
            padding-left: 0;
            white-space: pre;
        }
    </style>
</head>
<body>
    <h1>Verificación de Extracción de Texto</h1>
    <div class="center-line"></div>
    
    <!-- Títulos de Plataforma -->
    <div class="row">
        <div class="col"><h2 class="platform-title" id="title1">Cargando...</h2></div>
        <div class="col-right"><h2 class="platform-title" id="title2">Cargando...</h2></div>
    </div>

    <!-- Sottotitoli BLOCKS -->
    <div class="row">
        <div class="col"><h3 class="section-subtitle">Blocks</h3></div>
        <div class="col-right"><h3 class="section-subtitle">Blocks</h3></div>
    </div>

    <!-- Imágenes -->
    <div class="row images-row">
        <div class="col" id="img1"></div>
        <div class="col-right" id="img2"></div>
    </div>

    <!-- Sottotitoli TEXTO -->
    <div class="row">
        <div class="col"><h3 class="section-subtitle">Texto Extraído</h3></div>
        <div class="col-right"><h3 class="section-subtitle">Texto Extraído</h3></div>
    </div>

    <!-- Contenido Texto -->
    <div class="row">
        <div class="col"><div class="text-container" id="text1"></div></div>
        <div class="col-right"><div class="text-container" id="text2"></div></div>
    </div>

    <script>
        function loadTextData(fileUrl, titleId, imgContainerId, textContainerId, imageFileName, actividad) {
            const title = document.getElementById(titleId);
            const imgContainer = document.getElementById(imgContainerId);
            const textContainer = document.getElementById(textContainerId);

            if(!fileUrl) return;

            fetch(fileUrl)
                .then(r => r.json())
                .then(data => {
                    let platformName = data.platform || 'Plataforma';
                    if (platformName === 'MakeCode') platformName = 'Microbit';

                    title.innerText = platformName;
                    imgContainer.innerHTML = `<img src="../../actividades/${actividad}/${imageFileName}" class="source-image" alt="Source Image">`;
                    
                    textContainer.innerHTML = ''; 
                    if (data.extracted_text && data.extracted_text.length > 0) {
                        data.extracted_text.forEach(block => {
                            // Extraer espacios iniciales
                            const match = block.match(/^( *)/);
                            const spacesCount = match ? match[1].length : 0;
                            const text = block.substring(spacesCount);
                            const indentLevels = Math.floor(spacesCount / 2); // Asumiendo 2 espacios por indentación

                            const lineDiv = document.createElement('div');
                            lineDiv.className = 'code-line';

                            // Dibujar guías verticales
                            for(let i=0; i<indentLevels; i++) {
                                const guide = document.createElement('div');
                                guide.className = 'indent-guide';
                                lineDiv.appendChild(guide);
                            }

                            const textSpan = document.createElement('span');
                            textSpan.className = 'code-text';
                            textSpan.innerHTML = text === '' ? '&nbsp;' : text;
                            lineDiv.appendChild(textSpan);

                            textContainer.appendChild(lineDiv);
                        });
                    } else {
                        textContainer.innerHTML = '<p>No se encontraron bloques de texto.</p>';
                    }
                })
                .catch(e => {
                    textContainer.innerHTML = `<p style="color:red">Error cargando ${fileUrl}: ${e}</p>`;
                });
        }

        const params = new URLSearchParams(window.location.search);
        const actividad = params.get('actividad');
        if (actividad) {
            loadTextData(`../actividades/${actividad}/text_makecode.json`, 'title1', 'img1', 'text1', 'microbit.png', actividad);
            loadTextData(`../actividades/${actividad}/text_protobject.json`, 'title2', 'img2', 'text2', 'protobject.png', actividad);
        } else {
            document.querySelector('.row').innerHTML = "<p>Falta parámetro ?actividad=</p>";
        }
    </script>
</body>
</html>
