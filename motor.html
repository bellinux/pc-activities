<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protobject Activities Viewer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- js-yaml per il parsing del Frontmatter YAML -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    
    <!-- Marked.js per convertire Markdown in HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Stili per il rendering del testo Markdown */
        .markdown-body h1 { font-size: 1.875rem; font-weight: 800; margin-top: 1.5em; margin-bottom: 0.75em; color: #111827; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.75em; color: #1f2937; }
        .markdown-body h3 { font-size: 1.25rem; font-weight: 700; margin-top: 1.2em; margin-bottom: 0.5em; color: #374151; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.6; color: #4b5563; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .markdown-body strong { font-weight: 600; color: #111827; }
        .markdown-body em { font-style: italic; }
        .markdown-body blockquote { border-left: 4px solid #e5e7eb; padding-left: 1rem; color: #6b7280; font-style: italic; margin-bottom: 1rem; background: #f9fafb; padding-top: 0.5rem; padding-bottom: 0.5rem;}
        
        /* Nasconde la scrollbar ma mantiene lo scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Stile Modal per scorrimento interno fluido */
        .modal-content-scroll { max-height: calc(100vh - 120px); overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-50 h-screen w-screen overflow-hidden flex font-sans text-gray-900 relative">

    <!-- SIDEBAR SINISTRA (30%) -->
    <aside class="w-[30%] min-w-[300px] max-w-[400px] bg-white border-r border-gray-200 flex flex-col h-full shadow-sm z-10 relative">
        <div class="p-6 border-b border-gray-200 bg-gray-50">
            <h1 class="text-2xl font-extrabold text-indigo-600 flex items-center gap-2">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                Protobject
            </h1>
            <p class="text-xs text-gray-500 mt-1 uppercase tracking-wider font-semibold">Activity Editor & Viewer</p>
            
            <div class="mt-4">
                <label for="langSelect" class="block text-sm font-medium text-gray-700 mb-1">Lingua / Language / Idioma</label>
                <select id="langSelect" class="w-full border-gray-300 border rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm bg-white">
                    <option value="it" selected>Italiano</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                </select>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar p-3" id="menuList">
            <!-- Popolato via JS -->
        </div>
    </aside>

    <!-- AREA CONTENUTO DESTRA (70%) -->
    <main class="flex-1 h-full overflow-y-auto bg-white relative no-scrollbar" id="mainContent">
        <div class="flex h-full items-center justify-center text-gray-400 flex-col">
            <svg class="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
            <p class="text-lg font-medium">Seleziona un'attività dal menu per iniziare</p>
        </div>
    </main>

    <!-- MODAL GUIDA PROFESSORE -->
    <div id="teacherModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal('teacherModal')"></div>
        <div class="absolute inset-4 md:inset-10 lg:inset-x-32 xl:inset-x-64 bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden transform transition-all border border-gray-200">
            <div class="px-6 py-4 border-b border-gray-200 bg-amber-50 flex justify-between items-center">
                <h2 class="text-xl font-bold text-amber-800 flex items-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    Guida per il Professore
                </h2>
                <button onclick="closeModal('teacherModal')" class="text-gray-400 hover:text-gray-700 bg-white hover:bg-gray-100 rounded-full p-2 transition-colors border border-transparent hover:border-gray-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="teacherModalContent" class="p-6 md:p-10 modal-content-scroll bg-white"></div>
        </div>
    </div>

    <!-- MODAL INFO TECNICHE -->
    <div id="infoModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal('infoModal')"></div>
        <div class="absolute inset-4 md:inset-10 lg:inset-x-64 xl:inset-x-96 bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden transform transition-all border border-gray-200">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    Info Tecniche (YAML)
                </h2>
                <button onclick="closeModal('infoModal')" class="text-gray-400 hover:text-gray-700 bg-white hover:bg-gray-200 rounded-full p-2 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="infoModalContent" class="p-0 modal-content-scroll bg-white"></div>
        </div>
    </div>

    <!-- MOTORE JAVASCRIPT -->
    <script>
        const activities = [
            "01-led-lamp", 
			"02-light-signal", 
			"03-play-happyb", 
			"04-play-happyb-light",
            "05-create-a-traffic-light", 
			"06-traffic-light-with-flashing-yellow-light",
            "07-stopwatch", 
			"08-anti-theft-alarm",
            "09-turn-on-the-light", "10-alarm-with-a-switch", "11-manual-people-counter",
            "12-volume-control-with-a-potentiometer", "13-lamp-with-variable-intensity",
            "14-colors-on-the-screen", "15-tilt-sensor", "16-fall-detector",
            "17-noise-visualizer", "18-regular-polygons", "19-lighthouse-with-a-switch",
            "20-light-button-panel", "21-safe-box-with-alarm", "22-presentation-pointer"
        ];

        let currentActivity = null;
        let currentActivityData = null;

        document.addEventListener('DOMContentLoaded', () => {
            renderMenu();
            document.getElementById('langSelect').addEventListener('change', () => {
                if(currentActivity) loadActivity(currentActivity);
            });
        });

        function renderMenu() {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';

            activities.forEach((activity) => {
                const displayName = activity.replace(/^[0-9\.\-]+\-/, '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                const numberMatch = activity.match(/^[0-9\.]+/);
                const number = numberMatch ? numberMatch[0] : '';

                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 mb-2 rounded-lg transition-all duration-200 border text-sm font-medium flex items-center gap-3
                                 hover:bg-indigo-50 hover:border-indigo-200 border-transparent text-gray-700`;
                btn.id = `btn-${activity}`;
                btn.innerHTML = `<span class="bg-gray-100 text-gray-500 px-2 py-1 rounded text-xs font-bold w-10 text-center shrink-0">${number}</span> <span class="truncate">${displayName}</span>`;
                
                btn.onclick = () => {
                    document.querySelectorAll('#menuList button').forEach(b => {
                        b.classList.remove('bg-indigo-50', 'border-indigo-200', 'text-indigo-700', 'shadow-sm');
                        b.classList.add('border-transparent');
                    });
                    btn.classList.remove('border-transparent');
                    btn.classList.add('bg-indigo-50', 'border-indigo-200', 'text-indigo-700', 'shadow-sm');
                    
                    currentActivity = activity;
                    loadActivity(activity);
                };
                menuList.appendChild(btn);
            });
        }

        function formatCustomTags(html) {
            if(!html) return '';
            let parsed = html;
            parsed = parsed.replace(/<addbutton>(.*?)<\/addbutton>/gi, '<span class="bg-blue-100 text-blue-800 font-bold px-2 py-0.5 rounded shadow-sm border border-blue-200 inline-flex items-center gap-1 mx-1 text-[0.7rem] uppercase tracking-wider">➕ $1</span>');
            parsed = parsed.replace(/<comp>(.*?)<\/comp>/gi, '<span class="bg-emerald-100 text-emerald-800 font-mono font-bold px-2 py-0.5 rounded shadow-sm border border-emerald-200 inline-flex items-center gap-1 mx-1 text-sm">🧩 $1</span>');
            parsed = parsed.replace(/<qr>(\s*code)?/gi, '<span class="bg-gray-800 text-white font-bold px-2 py-0.5 rounded shadow-sm inline-flex items-center gap-1 mx-1 text-xs">📱 QR</span>');
            parsed = parsed.replace(/<openwindow>(.*?)<\/openwindow>/gi, '<span class="bg-purple-100 text-purple-800 font-bold px-2 py-0.5 rounded shadow-sm border border-purple-200 inline-flex items-center gap-1 mx-1 text-[0.7rem] uppercase tracking-wider">💻 $1</span>');
            parsed = parsed.replace(/<category>(.*?)<\/category>/gi, '<span class="bg-amber-100 text-amber-800 font-bold px-2 py-0.5 rounded shadow-sm border border-amber-200 inline-flex items-center gap-1 mx-1 text-[0.7rem] uppercase tracking-wider">📁 $1</span>');
            return parsed;
        }

        function renderMedia(rawMediaString) {
            if (!rawMediaString) return '';
            
            let url = rawMediaString.trim();
            let height = "400px"; 

            const match = url.match(/^\[(\d+)\](.*)/);
            if (match) {
                height = match[1] + "px";
                url = match[2].trim();
            }

            const lowerUrl = url.toLowerCase();

            if (lowerUrl.endsWith('.mp4') || lowerUrl.endsWith('.webm') || lowerUrl.endsWith('.ogg')) {
                return `
                <div class="rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-black flex justify-center w-full">
                    <video src="${url}" controls playsinline class="max-h-[500px] w-auto object-contain"></video>
                </div>`;
            }
            else if (lowerUrl.endsWith('.svg') || lowerUrl.endsWith('.png') || lowerUrl.endsWith('.jpg') || lowerUrl.endsWith('.jpeg') || lowerUrl.endsWith('.gif')) {
                return `
                <div class="rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-white flex justify-center p-4">
                    <img src="${url}" alt="Media" class="max-h-[400px] w-auto object-contain">
                </div>`;
            }
            else if (lowerUrl.startsWith('http')) {
                return `
                <div class="rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-gray-100">
                    <iframe src="${url}" style="height: ${height}; width: 100%; border: none;" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>`;
            }
            return `<div class="bg-red-50 text-red-500 p-4 rounded text-sm font-mono break-all border border-red-200">Formato Media sconosciuto: ${url}</div>`;
        }

        // Sistema di Rendering Errori
        function renderError(title, message, isCode = false) {
            const contentArea = document.getElementById('mainContent');
            contentArea.innerHTML = `
                <div class="p-10 max-w-4xl mx-auto mt-10">
                    <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-lg shadow-sm flex items-start gap-4">
                        <svg class="w-8 h-8 text-red-500 shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <div class="w-full overflow-hidden">
                            <h2 class="text-xl font-bold text-red-800 mb-2">${title}</h2>
                            ${isCode ? `<pre class="bg-red-100 text-red-900 p-4 rounded text-sm overflow-x-auto border border-red-200"><code>${message}</code></pre>` : `<p class="text-red-700">${message}</p>`}
                        </div>
                    </div>
                </div>`;
        }

        async function loadActivity(baseName) {
            const lang = document.getElementById('langSelect').value;
            const contentArea = document.getElementById('mainContent');
            
            contentArea.innerHTML = `
                <div class="flex h-full items-center justify-center">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
                </div>`;

            let fileText;
            const fileName = `${baseName}.${lang}.md`;

            // 1. Fetch File
            try {
                const response = await fetch(`_activities/${fileName}`);
                if (!response.ok) {
                    if(response.status === 404) throw new Error('FILE_NOT_FOUND');
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                fileText = await response.text();
            } catch (error) {
                if(error.message === 'FILE_NOT_FOUND') {
                    renderError("File Non Trovato (404)", `Il file <b>${fileName}</b> non esiste nella cartella <code>_activities/</code>.`);
                } else {
                    renderError("Errore di Connessione", `Impossibile caricare il file: ${error.message}`);
                }
                return;
            }

            // 2. Parse YAML
            try {
                const match = fileText.match(/^---\n([\s\S]*?)\n---/);
                if (!match) throw new Error('DELIMITERS_MISSING');
                
                currentActivityData = jsyaml.load(match[1]);
                renderStudentView(currentActivityData, contentArea);

            } catch (error) {
                if(error.message === 'DELIMITERS_MISSING') {
                    renderError("Struttura File non valida", `Il file <b>${fileName}</b> non inizia con l'intestazione YAML. Assicurati che i dati inizino e finiscano con <code>---</code>`);
                } else {
                    // Errore di js-yaml (errore di sintassi, indentazione, ecc.)
                    renderError("Errore di Sintassi YAML", error.message, true);
                }
            }
        }

        function generateSectionsHTML(sections, isForTeacher = false) {
            if(!sections || sections.length === 0) return '';
            
            let html = `<div class="flex flex-col gap-6 ${isForTeacher ? 'my-4 border-l-4 border-amber-300 pl-4' : 'mt-8'}">`;
            
            sections.forEach((sec) => {
                html += `<div class="bg-white rounded-xl ${isForTeacher ? 'border border-gray-100 p-5' : 'border border-gray-200 shadow-sm p-6 lg:p-8'}">`;
                
                if(sec.title) {
                    let iconHtml = sec.icon ? `<span class="${isForTeacher ? 'bg-amber-100 text-amber-600' : 'bg-indigo-100 text-indigo-600'} p-1.5 rounded-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></span>` : '';
                    html += `<h4 class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-3 border-b border-gray-100 pb-3">${iconHtml} ${sec.title}</h4>`;
                }

                html += `<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">`;
                
                html += `<div class="space-y-4">`;
                if(sec.heading_text) {
                    html += `<p class="font-semibold text-lg ${isForTeacher ? 'text-amber-700' : 'text-indigo-600'}">${formatCustomTags(sec.heading_text)}</p>`;
                }
                
                if(sec.content) {
                    let contentRaw = Array.isArray(sec.content) ? sec.content.join('\n\n') : sec.content;
                    html += `<div class="markdown-body text-gray-700">${formatCustomTags(marked.parse(contentRaw))}</div>`;
                }

                if(sec.steps) {
                    html += `<div class="bg-slate-50 rounded-lg p-5 border border-slate-200">`;
                    html += `<ol class="list-decimal pl-5 space-y-3">`;
                    sec.steps.forEach(step => {
                        html += `<li class="text-gray-700 marker:text-slate-500 marker:font-bold leading-relaxed">${formatCustomTags(marked.parseInline(step))}</li>`;
                    });
                    html += `</ol></div>`;
                }

                if(sec.ready_message) {
                    html += `<div class="mt-4 inline-flex items-center gap-2 text-green-700 bg-green-50 px-4 py-2.5 rounded-lg font-medium border border-green-200 w-full"><svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>${sec.ready_message}</div>`;
                }
                html += `</div>`; 

                html += `<div class="space-y-4 lg:pl-6 lg:border-l border-gray-100 h-full flex flex-col justify-center">`;
                
                if(sec.media) {
                    let mediaArr = Array.isArray(sec.media) ? sec.media : [sec.media];
                    mediaArr.forEach(mediaItem => {
                        html += renderMedia(mediaItem);
                    });
                }

                if(sec.right_content) {
                    sec.right_content.forEach(rc => {
                        if(rc.text) {
                            html += `<div class="bg-blue-50 border border-blue-200 rounded-xl p-5 markdown-body text-sm text-blue-900">${formatCustomTags(marked.parse(rc.text))}</div>`;
                        }
                        if(rc.media) {
                             html += renderMedia(rc.media);
                        }
                    });
                }

                html += `</div></div></div>`; 
            });
            html += `</div>`;
            return html;
        }

        // MAIN VIEW: Renderizza l'attività per lo Studente
        function renderStudentView(data, container) {
            let html = `<div class="max-w-5xl mx-auto p-8 pb-24">`;

            // HEADER (con bottoni a destra)
            html += `<header class="mb-10 relative">`;
            
            // Bottoni (Guida e Info) in assoluto in alto a destra
            html += `
            <div class="absolute right-0 top-0 flex gap-2 z-10">
                <button onclick="openInfoModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 font-semibold py-2 px-3 rounded-lg shadow-sm transition-colors flex items-center gap-2 text-sm" title="Mostra Info Tecniche / YAML">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    Info
                </button>`;
            
            if(data.teacher) {
                html += `
                <button onclick="openTeacherModal()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 font-bold py-2 px-4 rounded-lg shadow-sm transition-colors flex items-center gap-2 text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    Guida Professore
                </button>`;
            }
            html += `</div>`; // Fine bottoni

            // Badges (evitano l'area dei bottoni)
            html += `<div class="flex flex-wrap gap-2 mb-4 pr-64">`;
            if (data.level) html += `<span class="bg-slate-800 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">Level ${data.level}</span>`;
            if (data.computational_topics) {
                data.computational_topics.forEach(t => html += `<span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full">${t}</span>`);
            }
            if (data.general_topics) {
                data.general_topics.forEach(t => html += `<span class="bg-fuchsia-100 text-fuchsia-800 text-xs font-bold px-3 py-1 rounded-full">${t}</span>`);
            }
            html += `</div>`;

            // Titolo
            html += `<h1 class="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight w-3/4 leading-tight">${data.title || 'Senza Titolo'}</h1>`;
            
            // Descrizione
            if (data.description) html += `<p class="text-xl text-gray-500 leading-relaxed font-light mb-6">${data.description}</p>`;
            
            // RENDER IMMAGINE COPERTINA (SEMPRE COME <IMG>)
            if (data.image) {
                html += `
                <div class="w-full bg-white rounded-xl border border-gray-200 shadow-sm p-2 mb-6 flex justify-center">
                    <img src="${data.image}" alt="${data.title}" class="max-h-[300px] w-auto object-contain rounded-lg">
                </div>`;
            }

            // RENDER VIDEO SOTTO ALL'IMMAGINE SE PRESENTE
            if (data.video) {
                html += `<div class="mb-8">`;
                if(data.video_title) html += `<h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">${data.video_title}</h3>`;
                html += renderMedia(data.video) + `</div>`;
            }

            html += `</header>`;

            // INTRODUZIONE
            if (data.introduction) {
                html += `
                <div class="bg-indigo-50 border border-indigo-100 p-8 rounded-2xl shadow-sm mb-12">
                    <div class="markdown-body text-lg text-indigo-900">${formatCustomTags(marked.parse(data.introduction))}</div>
                </div>`;
            }

            // FLUSSO DELL'ATTIVITÀ (Tutte le content_sections)
            if (data.content_sections && data.content_sections.length > 0) {
                html += generateSectionsHTML(data.content_sections, false);
            } else {
                html += `<p class="text-gray-400 italic">Nessun contenuto definito in content_sections.</p>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // GESTIONE MODALS
        function openTeacherModal() {
            if(!currentActivityData || !currentActivityData.teacher) return;
            const content = document.getElementById('teacherModalContent');
            let rawTeacherText = currentActivityData.teacher;
            
            const placeholders = [];
            rawTeacherText = rawTeacherText.replace(/\{\{([\w\-]+)\}\}/g, (match, type) => {
                const token = `__PLACEHOLDER_${placeholders.length}__`;
                placeholders.push({ token, type: type.toLowerCase() });
                return token;
            });

            let teacherHtml = marked.parse(rawTeacherText);

            placeholders.forEach(ph => {
                const matchedSections = (currentActivityData.content_sections || []).filter(s => 
                    (s.type && s.type.toLowerCase() === ph.type) || 
                    (s.id && s.id.toLowerCase() === ph.type)
                );
                
                let injectionHtml = '';
                if(matchedSections.length > 0) {
                    injectionHtml = generateSectionsHTML(matchedSections, true); 
                } else {
                    injectionHtml = `<div class="p-3 bg-red-50 text-red-500 text-sm italic border border-red-200 rounded">Attenzione: nessuna sezione trovata per il tag {{${ph.type}}}</div>`;
                }

                teacherHtml = teacherHtml.replace(`<p>${ph.token}</p>`, injectionHtml); 
                teacherHtml = teacherHtml.replace(ph.token, injectionHtml); 
            });

            content.innerHTML = `<div class="markdown-body max-w-4xl mx-auto">${formatCustomTags(teacherHtml)}</div>`;
            document.getElementById('teacherModal').classList.remove('hidden');
        }

        function openInfoModal() {
            if(!currentActivityData) return;
            const content = document.getElementById('infoModalContent');
            
            // Proprietà principali da non mostrare nella tabella compatta
            const skipKeys = ['title', 'description', 'introduction', 'teacher', 'content_sections', 'tags', 'computational_topics', 'general_topics', 'image', 'video'];

            let html = `
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="uppercase tracking-wider border-b border-gray-200 bg-gray-50 text-gray-500 text-xs">
                        <tr><th scope="col" class="px-6 py-3 font-semibold">Tag YAML</th><th scope="col" class="px-6 py-3 font-semibold">Valore</th></tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">`;

            for (const [key, value] of Object.entries(currentActivityData)) {
                if (skipKeys.includes(key)) continue;

                let displayValue = value;
                if (Array.isArray(value)) displayValue = value.join(', ');
                else if (typeof value === 'object') displayValue = JSON.stringify(value);

                html += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-mono font-bold text-gray-700 text-xs">${key}</td>
                        <td class="px-6 py-4 font-mono text-gray-600 text-xs truncate max-w-[200px] md:max-w-md">${displayValue}</td>
                    </tr>`;
            }

            html += `</tbody></table>`;
            content.innerHTML = html;
            document.getElementById('infoModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }
    </script>
</body>
</html>
