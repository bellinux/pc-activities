    <!-- MOTOR JAVASCRIPT -->
    <script>
        // ===== Índice de actividades (17) — modificar activities.json para reordenar =====
        let ACT = [];           // slugs ordenados (desde activities.json)
        const META = {};        // slug -> { title, missing }
        const LANG = 'es';

        let currentActivity = null;
        let currentActivityData = null;

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('menuList').innerHTML = `
                <div class="flex items-center justify-center py-10 text-gray-400">
                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-indigo-600"></div>
                </div>`;
            await loadIndex();
            renderMenu();
            openDeepLinkFromHash();
            window.addEventListener('hashchange', openDeepLinkFromHash);
        });

        // Carga el índice ordenado (activities.json) y el título REAL del frontmatter de cada .md
        async function loadIndex() {
            try {
                const r = await fetch('activities.json', { cache: 'no-store' });
                const j = await r.json();
                ACT = Array.isArray(j) ? j : (j.activities || []);
            } catch (e) {
                ACT = [];
            }
            await Promise.all(ACT.map(async (slug) => {
                try {
                    const resp = await fetch(`_activities/${slug}.${LANG}.md`, { cache: 'no-store' });
                    if (!resp.ok) { META[slug] = { title: prettifySlug(slug), missing: true }; return; }
                    let t = await resp.text();
                    t = t.replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                    META[slug] = { title: extractTitle(t) || prettifySlug(slug) };
                } catch (e) {
                    META[slug] = { title: prettifySlug(slug), missing: true };
                }
            }));
        }

        // Extrae el campo `title:` del frontmatter YAML
        function extractTitle(md) {
            const m = md.match(/^---\n([\s\S]*?)\n---/);
            if (!m) return null;
            const tm = m[1].match(/^[ \t]*title:[ \t]*(.+)$/m);
            return tm ? tm[1].trim().replace(/^["']|["']$/g, '') : null;
        }

        function prettifySlug(slug) {
            return slug.replace(/^[0-9.\-]+\-/, '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function renderMenu() {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';

            const countEl = document.getElementById('filterCount');
            if (countEl) countEl.textContent = `${ACT.length} actividades`;

            if (ACT.length === 0) {
                menuList.innerHTML = `<p class="text-sm text-gray-400 italic text-center py-10 px-4">No se pudo cargar <code>activities.json</code>.</p>`;
                return;
            }

            ACT.forEach((slug, i) => {
                const num = i + 1;
                const meta = META[slug] || { title: prettifySlug(slug) };

                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 mb-2 rounded-lg transition-all duration-200 border text-sm font-medium flex items-center gap-3
                                 hover:bg-indigo-50 hover:border-indigo-200 border-transparent text-gray-700`;
                btn.id = `btn-${slug}`;
                btn.title = `_activities/${slug}.${LANG}.md`;
                btn.innerHTML = `<span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold w-8 text-center shrink-0">${num}</span>
                                 <span class="truncate flex-1">${escapeHtml(meta.title)}</span>`
                                 + (meta.missing ? ` <span class="text-[0.6rem] font-bold px-1 rounded bg-red-100 text-red-600 shrink-0" title="archivo no encontrado">!</span>` : '');

                btn.onclick = () => {
                    document.querySelectorAll('#menuList button').forEach(b => {
                        b.classList.remove('bg-indigo-50', 'border-indigo-200', 'text-indigo-700', 'shadow-sm');
                        b.classList.add('border-transparent');
                    });
                    btn.classList.remove('border-transparent');
                    btn.classList.add('bg-indigo-50', 'border-indigo-200', 'text-indigo-700', 'shadow-sm');

                    currentActivity = slug;
                    loadActivity(slug);
                };
                menuList.appendChild(btn);
            });
        }

        function formatCustomTags(html) {
            if(!html) return '';
            let parsed = html;
            parsed = parsed.replace(/<addbutton>(.*?)<\/addbutton>/gi, '<span class="bg-blue-100 text-blue-800 font-bold px-2 py-0.5 rounded shadow-sm border border-blue-200 inline-flex items-center gap-1 mx-1 text-[0.7rem] uppercase tracking-wider">➕ $1</span>');
            parsed = parsed.replace(/<comp>(.*?)<\/comp>/gi, '<span class="bg-emerald-100 text-emerald-800 font-mono font-bold px-2 py-0.5 rounded shadow-sm border border-emerald-200 inline-flex items-center gap-1 mx-1 text-sm">🧩 $1</span>');
            parsed = parsed.replace(/<qr>(\s*code)?/gi, '<span class="bg-gray-800 text-white font-bold px-2 py-0.5 rounded shadow-sm inline-flex items-center gap-1 mx-1 text-xs">📱 QR</span>');
            parsed = parsed.replace(/<openwindow>(.*?)<\/openwindow>/gi, '<span class="bg-purple-100 text-purple-800 font-bold px-2 py-0.5 rounded shadow-sm border border-purple-200 inline-flex items-center gap-1 mx-1 text-[0.7rem] uppercase tracking-wider">💻 $1</span>');
            parsed = parsed.replace(/<category>(.*?)<\/category>/gi, '<span class="bg-amber-100 text-amber-800 font-bold px-2 py-0.5 rounded shadow-sm border border-amber-200 inline-flex items-center gap-1 mx-1 text-[0.7rem] uppercase tracking-wider">📁 $1</span>');
            return parsed;
        }

        function renderMedia(rawMediaString) {
            if (!rawMediaString) return '';
            
            let url = rawMediaString.trim();
            let height = "400px"; 

            const match = url.match(/^\[(\d+)\](.*)/);
            if (match) {
                height = match[1] + "px";
                url = match[2].trim();
            }

            const lowerUrl = url.toLowerCase();

            if (lowerUrl.endsWith('.mp4') || lowerUrl.endsWith('.webm') || lowerUrl.endsWith('.ogg')) {
                return `
                <div class="rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-black flex justify-center w-full">
                    <video src="${url}" controls playsinline class="max-h-[500px] w-auto object-contain"></video>
                </div>`;
            }
            else if (lowerUrl.endsWith('.svg') || lowerUrl.endsWith('.png') || lowerUrl.endsWith('.jpg') || lowerUrl.endsWith('.jpeg') || lowerUrl.endsWith('.gif')) {
                return `
                <div class="rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-white flex justify-center p-4">
                    <img src="${url}" alt="Media" class="max-h-[400px] w-auto object-contain">
                </div>`;
            }
            else if (lowerUrl.startsWith('http')) {
                return `
                <div class="rounded-xl overflow-hidden shadow-sm border border-gray-200 bg-gray-100">
                    <iframe src="${url}" style="height: ${height}; width: 100%; border: none;" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>`;
            }
            return `<div class="bg-red-50 text-red-500 p-4 rounded text-sm font-mono break-all border border-red-200">Formato de medio desconocido: ${url}</div>`;
        }

        // ============================================================
        // DESCARGA DEL CÓDIGO (Protobject .ptj  +  Micro:bit .hex)
        // ============================================================

        // Extrae el código de actividad desde una cadena media.
        // Ej: "[600]https://app.protobject.com/generate?a02-timing&es&dynamic&-1" -> "a02-timing"
        function extractActivityCode(rawMediaString) {
            if (!rawMediaString) return null;
            let url = rawMediaString.trim();
            // elimina el eventual prefijo [altura]
            const heightMatch = url.match(/^\[(\d+)\](.*)/);
            if (heightMatch) url = heightMatch[2].trim();
            // toma todo lo que está entre "generate?" y el primer "&"
            const codeMatch = url.match(/generate\?([^&]+)/);
            return codeMatch ? codeMatch[1].trim() : null;
        }

        // Busca el código de actividad en todos los campos media de la sección
        function getActivityCodeFromSection(sec) {
            const candidates = [];
            if (sec.media) {
                (Array.isArray(sec.media) ? sec.media : [sec.media]).forEach(m => candidates.push(m));
            }
            if (sec.right_content) {
                sec.right_content.forEach(rc => { if (rc.media) candidates.push(rc.media); });
            }
            for (const c of candidates) {
                const code = extractActivityCode(c);
                if (code) return code;
            }
            return null;
        }

        // Genera el HTML de los dos enlaces de descarga (localizados)
        function renderDownloadButtons(code, lang) {
            const labels = {
                es: { title: "Descargar el código", p: "Descargar Protobject", m: "Descargar Micro:bit", o: "Abrir en Protobject" }
            };
            const L = labels[lang] || labels.es;

            const t = Date.now(); // anti-cache
            const ptjUrl = `https://codetutorials.protobject.com/${code}.ptj?${t}`;
            const hexUrl = `https://bellinux.github.io/pc-activities/microbit/${code}.hex?${t}`;
            const openUrl = `https://app.protobject.com/main?app/${code}`;

            const dlIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>`;
            const openIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>`;

            return `
            <div class="mt-4 pt-4 border-t border-gray-100">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">${L.title}</p>
                <div class="flex flex-col sm:flex-row gap-3">
                    <a href="${ptjUrl}" download="${code}.ptj" target="_blank" rel="noopener" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2 text-sm">
                        ${dlIcon} ${L.p} <span class="opacity-70 text-xs font-mono">.ptj</span>
                    </a>
                    <a href="${hexUrl}" download="${code}.hex" target="_blank" rel="noopener" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2.5 px-4 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2 text-sm">
                        ${dlIcon} ${L.m} <span class="opacity-70 text-xs font-mono">.hex</span>
                    </a>
                </div>
                <a href="${openUrl}" target="_blank" rel="noopener" class="mt-3 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 px-4 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2 text-sm">
                    ${openIcon} ${L.o} <span class="opacity-70 text-xs font-mono">↗</span>
                </a>
            </div>`;
        }

        // Sistema de Renderizado de Errores
        function renderError(title, message, isCode = false) {
            const contentArea = document.getElementById('mainContent');
            contentArea.innerHTML = `
                <div class="p-10 max-w-4xl mx-auto mt-10">
                    <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-lg shadow-sm flex items-start gap-4">
                        <svg class="w-8 h-8 text-red-500 shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <div class="w-full overflow-hidden">
                            <h2 class="text-xl font-bold text-red-800 mb-2">${title}</h2>
                            ${isCode ? `<pre class="bg-red-100 text-red-900 p-4 rounded text-sm overflow-x-auto border border-red-200"><code>${message}</code></pre>` : `<p class="text-red-700">${message}</p>`}
                        </div>
                    </div>
                </div>`;
        }

        async function loadActivity(baseName, highlightQuery) {
            const lang = LANG;

            const contentArea = document.getElementById('mainContent');
            
            contentArea.innerHTML = `
                <div class="flex h-full items-center justify-center">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
                </div>`;

            let fileText;
            const fileName = `${baseName}.${lang}.md`;

            // 1. Fetch File
            try {
                const response = await fetch(`_activities/${fileName}`);
                if (!response.ok) {
                    if(response.status === 404) throw new Error('FILE_NOT_FOUND');
                    throw new Error(`HTTP Error: ${response.status}`);
                }
                fileText = await response.text();
                // Normaliza los finales de línea de Windows (CRLF) y elimina un eventual BOM,
                // de lo contrario la regex del frontmatter (^---\n) no encuentra los delimitadores.
                fileText = fileText.replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            } catch (error) {
                if(error.message === 'FILE_NOT_FOUND') {
                    renderError("Archivo no encontrado (404)", `El archivo <b>${fileName}</b> no existe en la carpeta <code>_activities/</code>.`);
                } else {
                    renderError("Error de conexión", `No se pudo cargar el archivo: ${error.message}`);
                }
                return;
            }

            // 2. Parse YAML
            try {
                const match = fileText.match(/^---\n([\s\S]*?)\n---/);
                if (!match) throw new Error('DELIMITERS_MISSING');
                
                currentActivityData = jsyaml.load(match[1]);
                renderStudentView(currentActivityData, contentArea, fileName);
                if (highlightQuery) setTimeout(() => applyHighlight(highlightQuery), 60);

            } catch (error) {
                if(error.message === 'DELIMITERS_MISSING') {
                    renderError("Estructura de archivo no válida", `El archivo <b>${fileName}</b> no comienza con el encabezado YAML. Asegúrate de que los datos comiencen y terminen con <code>---</code>`);
                } else {
                    // Error de js-yaml (error de sintaxis, indentación, etc.)
                    renderError("Error de sintaxis YAML", error.message, true);
                }
            }
        }

        function generateSectionsHTML(sections, isForTeacher = false) {
            if(!sections || sections.length === 0) return '';

            const lang = 'es';
            
            let html = `<div class="flex flex-col gap-6 ${isForTeacher ? 'my-4 border-l-4 border-amber-300 pl-4' : 'mt-8'}">`;
            
            sections.forEach((sec) => {
                html += `<div class="bg-white rounded-xl ${isForTeacher ? 'border border-gray-100 p-5' : 'border border-gray-200 shadow-sm p-6 lg:p-8'}">`;
                
                if(sec.title) {
                    let iconHtml = sec.icon ? `<span class="${isForTeacher ? 'bg-amber-100 text-amber-600' : 'bg-indigo-100 text-indigo-600'} p-1.5 rounded-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></span>` : '';
                    html += `<h4 class="text-xl font-bold text-gray-800 mb-5 flex items-center gap-3 border-b border-gray-100 pb-3">${iconHtml} ${sec.title}</h4>`;
                }

                html += `<div class="flex flex-col gap-6 items-stretch">`;
                
                html += `<div class="space-y-4">`;
                if(sec.heading_text) {
                    html += `<p class="font-semibold text-lg ${isForTeacher ? 'text-amber-700' : 'text-indigo-600'}">${formatCustomTags(sec.heading_text)}</p>`;
                }
                
                if(sec.content) {
                    let contentRaw = Array.isArray(sec.content) ? sec.content.join('\n\n') : sec.content;
                    html += `<div class="markdown-body text-gray-700">${formatCustomTags(marked.parse(contentRaw))}</div>`;
                }

                if(sec.steps) {
                    html += `<div class="bg-slate-50 rounded-lg p-5 border border-slate-200">`;
                    html += `<ol class="list-decimal pl-5 space-y-3">`;
                    sec.steps.forEach(step => {
                        html += `<li class="text-gray-700 marker:text-slate-500 marker:font-bold leading-relaxed">${formatCustomTags(marked.parseInline(step))}</li>`;
                    });
                    html += `</ol></div>`;
                }

                if(sec.ready_message) {
                    html += `<div class="mt-4 inline-flex items-center gap-2 text-green-700 bg-green-50 px-4 py-2.5 rounded-lg font-medium border border-green-200 w-full"><svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>${sec.ready_message}</div>`;
                }
                html += `</div>`; 

                html += `<div class="space-y-4">`;
                
                if(sec.media) {
                    let mediaArr = Array.isArray(sec.media) ? sec.media : [sec.media];
                    mediaArr.forEach(mediaItem => {
                        html += renderMedia(mediaItem);
                    });
                }

                // BOTONES DE DESCARGA: solo para las secciones "code-composition"
                if(sec.type && sec.type.toLowerCase() === 'code-composition') {
                    const code = getActivityCodeFromSection(sec);
                    if(code) {
                        html += renderDownloadButtons(code, lang);
                    }
                }

                if(sec.right_content) {
                    sec.right_content.forEach(rc => {
                        if(rc.text) {
                            html += `<div class="bg-blue-50 border border-blue-200 rounded-xl p-5 markdown-body text-sm text-blue-900">${formatCustomTags(marked.parse(rc.text))}</div>`;
                        }
                        if(rc.media) {
                             html += renderMedia(rc.media);
                        }
                    });
                }

                html += `</div></div></div>`; 
            });
            html += `</div>`;
            return html;
        }

        // MAIN VIEW: Renderiza la actividad para el Estudiante
        function renderStudentView(data, container, fileName) {
            let html = `<div class="max-w-5xl mx-auto p-8 pb-24">`;

            // HEADER (con botones a la derecha)
            html += `<header class="mb-10 relative">`;
            
            // Botones (Guía e Info) en posición absoluta arriba a la derecha
            html += `
            <div class="absolute right-0 top-0 flex gap-2 z-10">
                <button onclick="openInfoModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-300 font-semibold py-2 px-3 rounded-lg shadow-sm transition-colors flex items-center gap-2 text-sm" title="Mostrar Info Técnica / YAML">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    Info
                </button>`;
            
            if(data.teacher) {
                html += `
                <button onclick="openTeacherModal()" class="bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 font-bold py-2 px-4 rounded-lg shadow-sm transition-colors flex items-center gap-2 text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    Guía del Profesor
                </button>`;
            }
            html += `</div>`; // Fin de botones

            // Badges (evitan el área de los botones)
            html += `<div class="flex flex-wrap gap-2 mb-4 pr-64">`;
            if (data.level) html += `<span class="bg-slate-800 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">Level ${data.level}</span>`;
            if (data.computational_topics) {
                data.computational_topics.forEach(t => html += `<span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full">${t}</span>`);
            }
            if (data.general_topics) {
                data.general_topics.forEach(t => html += `<span class="bg-fuchsia-100 text-fuchsia-800 text-xs font-bold px-3 py-1 rounded-full">${t}</span>`);
            }
            html += `</div>`;

            // Título
            html += `<h1 class="text-4xl font-extrabold text-gray-900 mb-2 tracking-tight w-3/4 leading-tight">${data.title || 'Sin título'}</h1>`;
            if (fileName) html += `<div class="mb-6"><span class="inline-flex items-center gap-1.5 text-xs font-mono text-gray-500 bg-gray-100 border border-gray-200 rounded px-2 py-1" title="Archivo Markdown de esta actividad"><svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>_activities/${escapeHtml(fileName)}</span></div>`;
            
            // Descripción
            if (data.description) html += `<p class="text-xl text-gray-500 leading-relaxed font-light mb-6">${data.description}</p>`;
            
            // RENDER IMAGEN PORTADA (SIEMPRE COMO <IMG>)
            if (data.image) {
                html += `
                <div class="w-full bg-white rounded-xl border border-gray-200 shadow-sm p-2 mb-6 flex justify-center">
                    <img src="${data.image}" alt="${data.title}" class="max-h-[300px] w-auto object-contain rounded-lg">
                </div>`;
            }

            // RENDER VIDEO DEBAJO DE LA IMAGEN SI ESTÁ PRESENTE
            if (data.video) {
                html += `<div class="mb-8">`;
                if(data.video_title) html += `<h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">${data.video_title}</h3>`;
                html += renderMedia(data.video) + `</div>`;
            }

            html += `</header>`;

            // INTRODUCCIÓN
            if (data.introduction) {
                html += `
                <div class="bg-indigo-50 border border-indigo-100 p-8 rounded-2xl shadow-sm mb-12">
                    <div class="markdown-body text-lg text-indigo-900">${formatCustomTags(marked.parse(data.introduction))}</div>
                </div>`;
            }

            // FLUJO DE LA ACTIVIDAD (Todas las content_sections)
            if (data.content_sections && data.content_sections.length > 0) {
                html += generateSectionsHTML(data.content_sections, false);
            } else {
                html += `<p class="text-gray-400 italic">Ningún contenido definido en content_sections.</p>`;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        // GESTIÓN DE MODALES
        function openTeacherModal() {
            if(!currentActivityData || !currentActivityData.teacher) return;
            const content = document.getElementById('teacherModalContent');
            let rawTeacherText = currentActivityData.teacher;
            
            const placeholders = [];
            rawTeacherText = rawTeacherText.replace(/\{\{([\w\-]+)\}\}/g, (match, type) => {
                const token = `__PLACEHOLDER_${placeholders.length}__`;
                placeholders.push({ token, type: type.toLowerCase() });
                return token;
            });

            let teacherHtml = marked.parse(rawTeacherText);

            placeholders.forEach(ph => {
                const matchedSections = (currentActivityData.content_sections || []).filter(s => 
                    (s.type && s.type.toLowerCase() === ph.type) || 
                    (s.id && s.id.toLowerCase() === ph.type)
                );
                
                let injectionHtml = '';
                if(matchedSections.length > 0) {
                    injectionHtml = generateSectionsHTML(matchedSections, true); 
                } else {
                    injectionHtml = `<div class="p-3 bg-red-50 text-red-500 text-sm italic border border-red-200 rounded">Atención: no se encontró ninguna sección para la etiqueta {{${ph.type}}}</div>`;
                }

                teacherHtml = teacherHtml.replace(`<p>${ph.token}</p>`, injectionHtml); 
                teacherHtml = teacherHtml.replace(ph.token, injectionHtml); 
            });

            content.innerHTML = `<div class="markdown-body max-w-4xl mx-auto">${formatCustomTags(teacherHtml)}</div>`;
            document.getElementById('teacherModal').classList.remove('hidden');
        }

        function openInfoModal() {
            if(!currentActivityData) return;
            const content = document.getElementById('infoModalContent');
            
            // Propiedades principales que no se muestran en la tabla compacta
            const skipKeys = ['title', 'description', 'introduction', 'teacher', 'content_sections', 'tags', 'computational_topics', 'general_topics', 'image', 'video'];

            let html = `
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="uppercase tracking-wider border-b border-gray-200 bg-gray-50 text-gray-500 text-xs">
                        <tr><th scope="col" class="px-6 py-3 font-semibold">Tag YAML</th><th scope="col" class="px-6 py-3 font-semibold">Valor</th></tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">`;

            for (const [key, value] of Object.entries(currentActivityData)) {
                if (skipKeys.includes(key)) continue;

                let displayValue = value;
                if (Array.isArray(value)) displayValue = value.join(', ');
                else if (typeof value === 'object') displayValue = JSON.stringify(value);

                html += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 font-mono font-bold text-gray-700 text-xs">${key}</td>
                        <td class="px-6 py-4 font-mono text-gray-600 text-xs truncate max-w-[200px] md:max-w-md">${displayValue}</td>
                    </tr>`;
            }

            html += `</tbody></table>`;
            content.innerHTML = html;
            document.getElementById('infoModal').classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }

        // ============================================================
        // DEEP-LINK + RESALTADO (apertura desde report.html)
        // ============================================================

        // Elimina los resaltados anteriores dentro de `root`.
        function clearHighlights(root) {
            (root || document).querySelectorAll('mark.hl').forEach(m => {
                const parent = m.parentNode;
                if (!parent) return;
                parent.replaceChild(document.createTextNode(m.textContent), m);
                parent.normalize();
            });
        }

        // Busca `query` en el texto de `container` (ignora las etiquetas, normaliza los espacios),
        // envuelve la primera coincidencia en <mark class="hl"> y la retorna (o null).
        function highlightInContainer(container, query) {
            if (!container || !query) return null;
            const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
            const map = []; let full = ''; let node;
            while (node = walker.nextNode()) {
                const txt = node.nodeValue;
                for (let i = 0; i < txt.length; i++) map.push({ node: node, off: i });
                full += txt;
            }
            // cadena normalizada (espacios colapsados) + mapa hacia `full`
            let norm = ''; const n2f = []; let prevSpace = false;
            for (let i = 0; i < full.length; i++) {
                const c = full[i];
                if (/\s/.test(c)) { if (!prevSpace) { norm += ' '; n2f.push(i); prevSpace = true; } }
                else { norm += c; n2f.push(i); prevSpace = false; }
            }
            const nq = query.replace(/\s+/g, ' ').trim();
            if (nq.length < 3) return null;
            const idx = norm.toLowerCase().indexOf(nq.toLowerCase());
            if (idx < 0) return null;
            const startFull = n2f[idx];
            const endFull = n2f[idx + nq.length - 1] + 1;
            // agrupa el intervalo por nodo de texto
            const segs = []; let cur = null;
            for (let i = startFull; i < endFull; i++) {
                const m = map[i];
                if (cur && cur.node === m.node) cur.to = m.off + 1;
                else { if (cur) segs.push(cur); cur = { node: m.node, from: m.off, to: m.off + 1 }; }
            }
            if (cur) segs.push(cur);
            let first = null;
            // del último al primero así los offsets se mantienen válidos
            segs.slice().reverse().forEach(seg => {
                try {
                    const r = document.createRange();
                    r.setStart(seg.node, seg.from);
                    r.setEnd(seg.node, seg.to);
                    const mark = document.createElement('mark');
                    mark.className = 'hl';
                    r.surroundContents(mark);
                    first = mark;
                } catch (e) {}
            });
            return first;
        }

        // Resalta en la vista estudiante; si no encuentra, prueba en la guía docente (modal);
        // si tampoco está ahí, el punto está en el CÓDIGO (bloques) → muestra un aviso.
        function applyHighlight(query) {
            if (!query) return;
            removeCodeNotice();
            clearHighlights(document.getElementById('mainContent'));
            let mark = highlightInContainer(document.getElementById('mainContent'), query);
            if (mark) { mark.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
            if (currentActivityData && currentActivityData.teacher) {
                openTeacherModal();
                mark = highlightInContainer(document.getElementById('teacherModalContent'), query);
                if (mark) { mark.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
                closeModal('teacherModal');
            }
            showCodeNotice(query);
        }

        function escapeHtml(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function removeCodeNotice() {
            const n = document.getElementById('codeNotice');
            if (n) n.remove();
        }

        // El texto no está en el .md (está en un comentario de los bloques): muestra un aviso al lado
        // a la sección del código e invita a verificarlo en los bloques (Abrir en Protobject).
        function showCodeNotice(query) {
            const main = document.getElementById('mainContent');
            if (!main) return;
            removeCodeNotice();
            const openBtn = main.querySelector('a[href*="app.protobject.com/main"]');
            const iframe = main.querySelector('iframe[src*="protobject.com/generate"]');
            const target = openBtn || iframe;
            const section = target ? target.closest('div.bg-white.rounded-xl') : null;

            const notice = document.createElement('div');
            notice.id = 'codeNotice';
            notice.className = 'mb-6 bg-amber-50 border-l-4 border-amber-400 rounded-r-lg p-4 flex items-start gap-3 shadow-sm';
            notice.innerHTML = `
                <svg class="w-6 h-6 text-amber-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <div class="text-sm text-amber-900">
                    <p class="font-bold mb-1">Este detalle está en el código (los bloques), no en el texto</p>
                    <p>No aparece en el texto de esta actividad, así que el punto a revisar está en los <b>bloques de programación</b>. Ábrelo en Protobject (botón más abajo) y verifícalo en el bloque correspondiente.</p>
                    <p class="mt-2 text-amber-800">Texto a verificar: <span class="font-mono bg-amber-100 px-1.5 py-0.5 rounded break-all">${escapeHtml(query)}</span></p>
                </div>`;

            if (section && section.parentNode) {
                section.parentNode.insertBefore(notice, section);
            } else {
                const wrap = main.querySelector('.max-w-5xl') || main;
                wrap.insertBefore(notice, wrap.firstChild);
            }
            setTimeout(() => notice.scrollIntoView({ behavior: 'smooth', block: 'center' }), 60);
        }

        // Abre la actividad indicada en el hash (#a=<slug>&q=<texto>&l=<lang>) y la resalta.
        function openDeepLinkFromHash() {
            const h = location.hash.replace(/^#/, '');
            if (!h) return;
            const params = new URLSearchParams(h);
            const slug = params.get('a');
            if (!slug || ACT.indexOf(slug) < 0) return;
            const q = params.get('q') || '';
            currentActivity = slug;
            const btn = document.getElementById('btn-' + slug);
            if (btn) {
                document.querySelectorAll('#menuList button').forEach(b => {
                    b.classList.remove('bg-indigo-50', 'border-indigo-200', 'text-indigo-700', 'shadow-sm');
                    b.classList.add('border-transparent');
                });
                btn.classList.remove('border-transparent');
                btn.classList.add('bg-indigo-50', 'border-indigo-200', 'text-indigo-700', 'shadow-sm');
                btn.scrollIntoView({ block: 'nearest' });
            }
            loadActivity(slug, q);
        }
    </script>
